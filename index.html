<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gains" />
  <meta name="theme-color" content="#080808" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Gains-O-Matic</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Inconsolata:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:         #080808;
      --surface:    #111111;
      --surface2:   #181818;
      --border:     #242424;
      --accent:     #F4A7B9;
      --accentDim:  rgba(244,167,185,0.12);
      --accentBrd:  rgba(244,167,185,0.35);
      --teal:       #00D4C8;
      --tealDim:    rgba(0,212,200,0.1);
      --tealBrd:    rgba(0,212,200,0.3);
      --green:      #34d399;
      --greenDim:   rgba(52,211,153,0.1);
      --greenBrd:   rgba(52,211,153,0.3);
      --text:       #ededed;
      --muted:      #666;
      --dim:        #333;
      --safe-top:   env(safe-area-inset-top, 0px);
      --safe-bot:   env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif;
      -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; overscroll-behavior: none;
    }

    #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; position: relative; }
    #scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(60px + var(--safe-bot)); }

    #header { padding: calc(var(--safe-top) + 16px) 18px 14px; border-bottom: 1px solid var(--border); background: var(--bg); position: relative; flex-shrink: 0; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2.5px; color: var(--accent); line-height: 1; }
    .app-subtitle { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 3px; }
    .header-right { display: flex; gap: 6px; align-items: center; margin-top: 2px; }
    .done-badge { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--accent); background: var(--accentDim); border: 1px solid var(--accentBrd); border-radius: 5px; padding: 3px 8px; white-space: nowrap; }

    .icon-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 5px 10px; border-radius: 5px; font-size: 11px; font-family: 'Barlow', sans-serif; font-weight: 600; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .icon-btn:active { transform: scale(0.96); }
    .icon-btn.connected { border-color: var(--tealBrd); color: var(--teal); background: var(--tealDim); }
    .icon-btn.syncing { border-color: var(--accentBrd); color: var(--accent); }

    #nav { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
    .nav-item { flex: 1; padding: 11px 0; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; color: #444; font-family: 'Barlow', sans-serif; }
    .nav-item.on { color: var(--accent); border-bottom-color: var(--accent); }

    .cat-bar { display: flex; gap: 7px; padding: 12px 18px; border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
    .cat-bar::-webkit-scrollbar { display: none; }
    .cat-pill { padding: 6px 13px; border-radius: 5px; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; cursor: pointer; border: none; font-family: 'Barlow', sans-serif; white-space: nowrap; flex-shrink: 0; }
    .cat-pill.on { background: var(--accent); color: #000; }
    .cat-pill.off { background: var(--surface2); color: var(--muted); }

    .subgroup-label { font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 3px; color: var(--muted); padding: 13px 0 7px; border-bottom: 1px solid var(--border); margin-bottom: 7px; text-transform: uppercase; }

    .ex-card { border-radius: 8px; padding: 12px 14px; margin-bottom: 6px; cursor: pointer; position: relative; overflow: hidden; transition: background .15s; -webkit-user-select: none; user-select: none; border: 1px solid var(--border); background: var(--surface); }
    .ex-card.open { border-radius: 8px 8px 0 0; margin-bottom: 0; }
    .ex-card-inner { display: flex; align-items: center; justify-content: space-between; }
    .ex-left { display: flex; align-items: center; gap: 11px; }
    .ex-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; border: 2px solid var(--dim); }
    .ex-name { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1px; line-height: 1.1; color: var(--text); }
    .ex-meta { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--muted); margin-top: 1px; }
    .ex-weight { text-align: right; }
    .ex-weight-val { font-family: 'Inconsolata', monospace; font-weight: 700; font-size: 20px; line-height: 1; }
    .ex-weight-unit { font-size: 10px; font-weight: 400; color: var(--muted); }
    .ex-pb-badge { font-size: 9px; letter-spacing: 1px; margin-top: 2px; }
    .logged-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--green); }

    .expand-panel { background: var(--surface2); border: 1px solid var(--accent); border-top: none; border-radius: 0 0 8px 8px; padding: 14px; margin-bottom: 6px; animation: expandIn .18s ease; }
    @keyframes expandIn { from { opacity: 0; transform: scaleY(0.92); transform-origin: top; } to { opacity: 1; transform: scaleY(1); } }

    .stat-row { display: flex; gap: 7px; margin-bottom: 12px; }
    .stat-box { flex: 1; border-radius: 6px; padding: 8px 10px; border: 1px solid var(--border); background: var(--surface); }
    .stat-box-label { font-size: 8px; letter-spacing: 1.8px; font-weight: 700; margin-bottom: 4px; font-family: 'Barlow', sans-serif; }
    .stat-box-val { font-family: 'Inconsolata', monospace; font-weight: 700; font-size: 16px; }

    .input-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 8px; }
    .weight-wrap { flex: 1; position: relative; }
    .weight-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px 38px 12px 14px; color: var(--text); font-size: 20px; font-family: 'Inconsolata', monospace; font-weight: 700; outline: none; -webkit-appearance: none; appearance: none; }
    .weight-input:focus { border-color: var(--accent); }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .kg-label { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 11px; font-family: 'Inconsolata', monospace; pointer-events: none; }

    .custom-select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 6px; font-family: 'Barlow', sans-serif; margin-bottom: 8px; font-size: 14px; outline: none; }
    .custom-select:focus { border-color: var(--accent); }
    .custom-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 6px; font-family: 'Barlow', sans-serif; margin-bottom: 8px; font-size: 14px; outline: none; }
    .custom-input:focus { border-color: var(--accent); }

    .log-btn { padding: 0 16px; border-radius: 6px; font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1.2px; border: none; cursor: pointer; transition: all .15s; white-space: nowrap; background: var(--accent); color: #000; }
    .log-btn:active { transform: scale(0.96); }

    .chips-row { display: flex; gap: 5px; margin-top: 8px; }
    .chip { flex: 1; padding: 6px 0; border-radius: 5px; font-size: 11px; font-family: 'Inconsolata', monospace; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--muted); text-align: center; }
    .chip.active { background: var(--accentDim); border-color: var(--accent); color: var(--accent); }
    
    .set-tracker { margin-top: 12px; background: var(--bg); padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
    .set-bar-bg { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    .set-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

    .hint-text { font-size: 9px; color: var(--dim); letter-spacing: 0.5px; margin-top: 8px; }
    .lower-note { font-size: 9px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 5px 9px; margin-bottom: 10px; letter-spacing: 0.5px; }

    .log-inner { padding: 12px 18px; }
    .history-inner { padding: 14px 18px; }
    .hist-date-label { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 2.5px; margin-bottom: 8px; padding-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
    .today-chip { font-size: 9px; background: var(--accentDim); border: 1px solid var(--accentBrd); padding: 2px 7px; border-radius: 4px; }
    .hist-entry { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--surface); border-radius: 6px; margin-bottom: 5px; border: 1px solid var(--border); }
    .hist-entry.is-pb { border-color: var(--accentBrd); }
    .hist-name { font-weight: 600; font-size: 13px; }
    .hist-meta { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--muted); margin-top: 1px; }
    .hist-weight { font-family: 'Inconsolata', monospace; font-weight: 700; font-size: 19px; text-align: right; line-height: 1; }
    .hist-pb { font-size: 9px; color: var(--accent); margin-top: 2px; letter-spacing: 1px; }

    #toast { position: fixed; top: calc(var(--safe-top) + 16px); left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 9px 20px; border-radius: 6px; font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 1.2px; z-index: 9999; pointer-events: none; white-space: nowrap; box-shadow: 0 6px 24px rgba(244,167,185,0.4); animation: slideDown .25s cubic-bezier(.22,1,.36,1); }
    #toast.teal { background: var(--teal); box-shadow: 0 6px 24px rgba(0,212,200,0.4); }
    #toast.error { background: #ff4d4d; box-shadow: 0 6px 24px rgba(255,77,77,0.4); }
    @keyframes slideDown { from { transform: translateX(-50%) translateY(-12px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: flex-end; z-index: 8888; padding-bottom: var(--safe-bot); }
    .modal-overlay.hidden { display: none; }
    .modal-sheet { width: 100%; max-width: 480px; margin: 0 auto; background: var(--surface); border-radius: 18px 18px 0 0; border: 1px solid var(--border); padding: 28px 24px calc(24px + var(--safe-bot)); }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--accent); margin-bottom: 14px; }
    .modal-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1.5px; cursor: pointer; background: var(--accent); color: #000; margin-bottom: 10px; transition: all .15s; }
    .modal-skip { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; background: none; color: var(--muted); }

    #sync-bar { position: fixed; bottom: calc(60px + var(--safe-bot)); left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--tealBrd); color: var(--teal); font-family: 'Inconsolata', monospace; font-size: 10px; padding: 5px 14px; border-radius: 20px; z-index: 100; pointer-events: none; opacity: 0; transition: opacity .3s; white-space: nowrap; }
    #sync-bar.show { opacity: 1; }

    .empty-state { text-align: center; color: var(--muted); margin-top: 80px; padding: 0 20px; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; margin-bottom: 8px; }
    .empty-sub { font-size: 13px; color: var(--dim); }
    .miami-stripe { height: 2px; background: linear-gradient(90deg, var(--accent) 0%, var(--teal) 50%, var(--accent) 100%); flex-shrink: 0; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
</head>
<body>

<div id="app">
  <div class="miami-stripe"></div>

  <div id="header">
    <div class="header-row">
      <div>
        <div class="app-title">GAINS-O-MATIC</div>
        <div class="app-subtitle" id="date-label"></div>
      </div>
      <div class="header-right">
        <span id="done-badge" class="done-badge" style="display:none"></span>
        <button class="icon-btn" id="sync-btn" onclick="handleSyncBtn()">⚡ SYNC</button>
      </div>
    </div>
  </div>

  <div id="nav">
    <button class="nav-item on" onclick="switchView('log')" id="nav-log">LOG</button>
    <button class="nav-item off" onclick="switchView('history')" id="nav-history">HISTORY</button>
    <button class="nav-item off" onclick="switchView('pbs')" id="nav-pbs">PBs</button>
  </div>

  <div id="scroll-area">
    <div id="view-log">
      <div class="cat-bar" id="cat-bar"></div>
      <div class="log-inner" id="exercise-list"></div>
    </div>

    <div id="view-history" style="display:none">
      <div class="history-inner" id="history-content"></div>
    </div>

    <div id="view-pbs" style="display:none">
      <div class="history-inner" id="pbs-content"></div>
    </div>
  </div>
</div>

<div id="toast" style="display:none"></div>
<div id="sync-bar">↑ syncing to sheets…</div>

<div id="legacy-modal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-title">ADD LEGACY PB</div>
    <div style="font-size:12px; color:var(--muted); margin-bottom:15px">Saves an entry as Jan 1st, 2020.</div>
    <select id="legacy-ex" class="custom-select" style="margin-bottom:12px"></select>
    <div class="input-row">
      <input id="legacy-w" type="number" step="0.5" class="custom-input" placeholder="Weight (kg)">
      <input id="legacy-r" type="number" class="custom-input" placeholder="Reps">
    </div>
    <button class="modal-btn" onclick="saveLegacyPB()">SAVE LEGACY PB</button>
    <button class="modal-skip" onclick="document.getElementById('legacy-modal').classList.add('hidden')">Cancel</button>
  </div>
</div>

<div id="auth-modal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-title">CONNECT GOOGLE SHEETS</div>
    <div style="font-size:13px; color:var(--muted); margin-bottom:20px; line-height:1.5;">
      Auto-sync every set to a <strong>Google Sheet</strong>. Tap <strong>SET UP</strong> to enter your credentials, or <strong>Skip</strong> to use offline.
    </div>
    <button class="modal-btn" onclick="showSetup()">SET UP GOOGLE SYNC</button>
    <button class="modal-skip" onclick="dismissAuth()">Skip for now — use offline</button>
  </div>
</div>

<div id="setup-modal" class="modal-overlay hidden">
  <div class="modal-sheet" style="border-radius:14px; max-width:440px; margin:auto; padding:28px 22px;">
    <div class="modal-title">GOOGLE SETUP</div>
    <label style="font-size:11px; font-weight:700; color:var(--muted); margin-bottom:6px; display:block">GOOGLE CLIENT ID</label>
    <input class="custom-input" id="client-id-input" type="text" placeholder="123456.apps.googleusercontent.com" />
    <label style="font-size:11px; font-weight:700; color:var(--muted); margin-bottom:6px; display:block">SPREADSHEET ID (optional)</label>
    <input class="custom-input" id="sheet-id-input" type="text" placeholder="Leave blank to create new" />
    <button class="modal-btn" onclick="saveSetup()" style="margin-top:10px">SAVE & CONNECT</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// PROGRAMME DATA (Shared Abs & Cardio)
// ─────────────────────────────────────────────────────────────────────────────
const SHARED_ABS = [
  { id: "sit_ups", name: "Sit Ups", sets: 1, reps: 20, isAbs: true },
  { id: "knee_tucks", name: "Knee Tucks", sets: 4, reps: 12, isAbs: true },
  { id: "other_abs", name: "Other", isOther: true, isAbs: true, sets: 4, reps: 15, alternates: [] }
];

const SHARED_CARDIO = [
  { id: "cardio", name: "Cardio Session", isCardio: true, sets: 1, reps: 1 }
];

const PROGRAM = {
  Pull: {
    BACK: [
      { id: "wide_grip_pull_ups", name: "Wide Grip Pull Ups", sets: 4, reps: 8, lowerIsBetter: true },
      { id: "lat_pull_down", name: "Lat Pull Down", sets: 4, reps: 8 },
      { id: "bent_over_rows", name: "Bent Over Rows", sets: 4, reps: 6 },
      { id: "other_back", name: "Other", isOther: true, sets: 4, reps: 8, alternates: ["Deadlift", "Diverting lat pull down", "Diverting Seated rows", "Normal seated rows", "Seated core rows", "Bend over rows, bench"] }
    ],
    BICEPS: [
      { id: "standing_db_curls", name: "Standing DB Curls", sets: 4, reps: 6 },
      { id: "preacher_curls", name: "Preacher Curls", sets: 4, reps: 6 },
      { id: "barbell_forearm_curls", name: "Barbell Forearm Curls", sets: 4, reps: 8 },
      { id: "other_biceps", name: "Other", isOther: true, sets: 4, reps: 8, alternates: ["Preacher curls, EZ bar", "Standing EZ bar curls", "Standing BB curls", "Cable curls"] }
    ],
    ABS: SHARED_ABS,
    CARDIO: SHARED_CARDIO
  },
  Push: {
    CHEST: [
      { id: "bench", name: "Bench", sets: 5, reps: 6 },
      { id: "incline_db_press", name: "Incline Dumbbell Press", sets: 4, reps: 8 },
      { id: "seated_flys", name: "Seated Flys", sets: 4, reps: 6 },
      { id: "other_chest", name: "Other", isOther: true, sets: 4, reps: 8, alternates: ["Bench flies", "Seated chest machine"] }
    ],
    TRICEPS: [
      { id: "tricep_extension", name: "Tricep Extension", sets: 4, reps: 8 },
      { id: "dips", name: "Dips", sets: 4, reps: 8, lowerIsBetter: true },
      { id: "tricep_cable_pushdown", name: "Tricep Cable Push Down", sets: 4, reps: 12 },
      { id: "other_triceps", name: "Other", isOther: true, sets: 4, reps: 10, alternates: ["Tricep cable rope", "Tricep cable extension", "Tricep cable reverse extensions", "Ez bar skull crushers"] }
    ],
    ABS: SHARED_ABS,
    CARDIO: SHARED_CARDIO
  },
  "Legs/Shoulders": {
    LEGS: [
      { id: "squats", name: "Squats", sets: 5, reps: 6 },
      { id: "incline_leg_press", name: "Incline Leg Press", sets: 4, reps: 8 },
      { id: "hamstring_machine", name: "Hamstring Machine", sets: 4, reps: 10 },
      { id: "quad_machine", name: "Quad Machine", sets: 4, reps: 10 },
      { id: "seated_calf_raises", name: "Seated Calf Raises", sets: 4, reps: 12 },
      { id: "other_legs", name: "Other", isOther: true, sets: 4, reps: 10, alternates: ["Hack squats"] }
    ],
    SHOULDERS: [
      { id: "overhead_press", name: "Overhead Press", sets: 4, reps: 8 },
      { id: "dumbbell_press", name: "Dumbbell Press", sets: 4, reps: 8 },
      { id: "cable_lat_raises", name: "Cable Lat Raises", sets: 4, reps: 8 },
      { id: "rear_delts", name: "Rear Delts", sets: 4, reps: 10 },
      { id: "other_shoulders", name: "Other", isOther: true, sets: 4, reps: 10, alternates: ["DB Lat raises"] }
    ],
    ABS: SHARED_ABS,
    CARDIO: SHARED_CARDIO
  },
};

const allExercises = cat => Object.values(PROGRAM[cat]).flat();
const findExercise = id => Object.values(PROGRAM).flatMap(g => Object.values(g).flat()).find(e => e.id === id);

// Fixed date function: 4 AM Reset
const todayISO = () => {
  const d = new Date();
  if (d.getHours() < 4) d.setDate(d.getDate() - 1);
  return d.toISOString().split("T")[0];
};
const fmtDate = d => new Date(d + "T12:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric" });

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let sessions = [];
let category = "Pull";
let selectedId = null;
let currentView = "log";
let today = todayISO();

// Form Input State
let weightInput = "";
let repInput = "";
let setsInput = "";
let cardioDist = "";
let cardioSpeed = "";
let cardioUnit = "kph";

// Set Progress & Dynamic Exercise State
let completedSets = {}; 
let otherSelectState = {}; 
let otherManualNames = {}; 

// Global Stopwatch State
let swInterval = null;
let swTime = 0;
let swActive = false;
let swTarget = 90; // Default 90s

// Google Sync
let gsiLoaded = false, tokenClient = null, accessToken = null;
let clientId = localStorage.getItem("gains_client_id") || "";
let spreadsheetId = localStorage.getItem("gains_sheet_id") || "";
let syncQueue = [];
let isSyncing = false;

// ─────────────────────────────────────────────────────────────────────────────
// PERSISTENCE
// ─────────────────────────────────────────────────────────────────────────────
function loadData() {
  try { const r = localStorage.getItem("gains_v1"); if (r) sessions = JSON.parse(r); } catch {}
}
function persist(next) {
  sessions = next;
  try { localStorage.setItem("gains_v1", JSON.stringify(next)); } catch {}
}

// ─────────────────────────────────────────────────────────────────────────────
// GLOBAL STOPWATCH LOGIC
// ─────────────────────────────────────────────────────────────────────────────
function updateTimerUI() {
  const disp = document.getElementById('sw-disp');
  const bar = document.getElementById('sw-bar');
  if (disp && bar) {
    const mins = Math.floor(swTime / 60);
    const secs = swTime % 60;
    disp.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
    const pct = Math.min(100, (swTime / swTarget) * 100);
    bar.style.width = pct + '%';
    bar.style.background = (swTime >= swTarget) ? 'var(--green)' : 'var(--accent)';
  }
}

function toggleTimer(target) {
  swTarget = target;
  const btn = document.getElementById('sw-btn-start');
  if (swActive) {
    clearInterval(swInterval);
    swActive = false;
    if (btn) {
      btn.textContent = 'START';
      btn.setAttribute('style', 'border-color:var(--accent); color:var(--accent);');
    }
  } else {
    swActive = true;
    if (btn) {
      btn.textContent = 'STOP';
      btn.setAttribute('style', 'background:var(--surface2); color:var(--text); border-color:var(--border);');
    }
    swInterval = setInterval(() => {
      swTime++;
      updateTimerUI();
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(swInterval);
  swActive = false;
  swTime = 0;
  updateTimerUI();
  const btn = document.getElementById('sw-btn-start');
  if (btn) {
    btn.textContent = 'START';
    btn.setAttribute('style', 'border-color:var(--accent); color:var(--accent);');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// LOGIC HELPER
// ─────────────────────────────────────────────────────────────────────────────
function getResolvedEx(ex) {
  if (!ex.isOther) return ex;
  const sel = otherSelectState[ex.id] || (ex.alternates[0] || "manual");
  if (sel === "manual") {
    const custom = otherManualNames[ex.id] || "Unknown Exercise";
    return { ...ex, id: ex.id + "_manual_" + custom.replace(/\W/g,''), name: custom, sets: setsInput || ex.sets };
  }
  return { ...ex, id: ex.id + "_" + sel.replace(/\W/g,''), name: sel };
}

function getTodayLog() { return sessions.filter(s => s.date === today); }

function getPB(resolvedId, lowerIsBetter) {
  const ws = sessions.filter(s => s.exerciseId === resolvedId && s.weight).map(s => s.weight);
  if (!ws.length) return null;
  return lowerIsBetter ? Math.min(...ws) : Math.max(...ws);
}

function getLastWeight(resolvedId) {
  const e = sessions.filter(s => s.exerciseId === resolvedId && s.weight && s.date !== today)
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
  return e[0]?.weight ?? null;
}

function getTodayWeight(resolvedId) { return getTodayLog().find(s => s.exerciseId === resolvedId)?.weight ?? null; }

function logSet(exId, totalSets) {
  completedSets[exId] = (completedSets[exId] || 0) + 1;
  renderLog();
}

function logCardioEntry(ex, subgroup) {
  let dist = parseFloat(cardioDist);
  let speed = parseFloat(cardioSpeed);
  if (isNaN(dist) || isNaN(speed) || dist <= 0 || speed <= 0) return;
  if (cardioUnit === "mph") speed = speed * 1.60934; 

  const entry = {
    id: Date.now().toString(), date: today, exerciseId: ex.id, exerciseName: ex.name,
    category, subgroup, isCardio: true, distance: dist, speed: speed.toFixed(2), sets: 1, reps: 1
  };
  
  const filtered = sessions.filter(s => !(s.exerciseId === ex.id && s.date === today));
  persist([...filtered, entry]);
  queueSync(entry, false);
  showToast(`✓ Cardio logged`);
  
  cardioDist = ""; cardioSpeed = ""; selectedId = null;
  renderLog(); updateDoneBadge();
}

function logWeight() {
  const baseEx = findExercise(selectedId);
  if (!baseEx) return;
  const subgroup = Object.entries(PROGRAM[category]).find(([, exs]) => exs.some(e => e.id === baseEx.id))?.[0] ?? "";
  
  if (baseEx.isCardio) return logCardioEntry(baseEx, subgroup);

  const ex = getResolvedEx(baseEx);
  const w = parseFloat(weightInput);
  const r = parseInt(repInput) || ex.reps;
  if (isNaN(w) || w <= 0) return;

  const pb = getPB(ex.id, baseEx.lowerIsBetter);
  const isNewPB = pb === null ? true : (baseEx.lowerIsBetter ? w < pb : w > pb);

  const entry = {
    id: Date.now().toString(), date: today,
    exerciseId: ex.id, exerciseName: ex.name,
    category, subgroup, weight: w, sets: ex.sets, reps: r,
  };

  const filtered = sessions.filter(s => !(s.exerciseId === ex.id && s.date === today));
  persist([...filtered, entry]);

  showToast(isNewPB ? `🏆 NEW PB — ${w}kg!` : `✓ ${w}kg logged`);
  queueSync(entry, isNewPB);

  weightInput = ""; repInput = ""; selectedId = null;
  renderLog(); updateDoneBadge();
}

// ─────────────────────────────────────────────────────────────────────────────
// GOOGLE SHEETS SYNC
// ─────────────────────────────────────────────────────────────────────────────
function loadGSI() {
  if (gsiLoaded || !clientId) return;
  const script = document.createElement("script"); script.src = "https://accounts.google.com/gsi/client";
  script.onload = () => {
    gsiLoaded = true;
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: clientId, scope: "https://www.googleapis.com/auth/spreadsheets",
      callback: (resp) => {
        if (resp.error) { showToast("Auth failed", "error"); return; }
        accessToken = resp.access_token;
        updateSyncBtn();
        showToast("Connected to Google ✓", "teal");
        if (!spreadsheetId) createSpreadsheet(); else flushQueue();
      },
    });
  };
  document.head.appendChild(script);
}

function requestToken() { if(tokenClient) tokenClient.requestAccessToken({ prompt: "" }); }
function handleSyncBtn() {
  if (!clientId) return document.getElementById("auth-modal").classList.remove("hidden");
  if (!accessToken) { if (!gsiLoaded) loadGSI(); setTimeout(() => requestToken(), 800); return; }
  flushQueue();
}

function updateSyncBtn() {
  const btn = document.getElementById("sync-btn");
  btn.className = accessToken ? "icon-btn connected" : "icon-btn";
  btn.textContent = accessToken ? "⚡ SYNCED" : (clientId ? "⚡ SIGN IN" : "⚡ SYNC");
}

async function createSpreadsheet() {
  showSyncBar();
  try {
    const res = await fetch("https://sheets.googleapis.com/v4/spreadsheets", {
      method: "POST",
      headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" },
      body: JSON.stringify({ properties: { title: "Gains-O-Matic" }, sheets: [{ properties: { title: "Sessions" } }] }),
    });
    const data = await res.json();
    spreadsheetId = data.spreadsheetId;
    localStorage.setItem("gains_sheet_id", spreadsheetId);

    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sessions!A1:J1:append?valueInputOption=USER_ENTERED`, {
      method: "POST",
      headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" },
      body: JSON.stringify({ values: [["Date", "Category", "Subgroup", "Exercise", "Sets", "Reps", "Weight (kg)", "Distance", "Speed (kph)", "PB?"]] })
    });

    hideSyncBar(); showToast("Sheet created ✓", "teal"); flushQueue();
  } catch (e) {
    hideSyncBar();
    document.getElementById("sync-btn").classList.remove("syncing");
    showToast("Sheet creation failed", "error");
  }
}

function queueSync(entry, isPB) { syncQueue.push({ entry, isPB }); if (accessToken) flushQueue(); }

async function flushQueue() {
  if (isSyncing || !syncQueue.length || !accessToken || !spreadsheetId) return;
  isSyncing = true; showSyncBar();
  const batch = [...syncQueue]; syncQueue = [];

  const rows = batch.map(({ entry, isPB }) => [
    entry.date, entry.category, entry.subgroup, entry.exerciseName, entry.sets, entry.reps, 
    entry.weight || "", entry.distance || "", entry.speed || "", isPB ? "PB" : "",
  ]);

  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sessions!A1:J1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`, {
      method: "POST", headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" },
      body: JSON.stringify({ values: rows }),
    });
    if (!res.ok) throw new Error();
    hideSyncBar(); updateSyncBtn();
  } catch {
    syncQueue = [...batch, ...syncQueue]; hideSyncBar(); showToast("Sync failed — will retry", "error");
  }
  isSyncing = false;
}

function showSyncBar() { document.getElementById("sync-bar").classList.add("show"); document.getElementById("sync-btn").classList.add("syncing"); document.getElementById("sync-btn").textContent = "↑ SYNCING"; }
function hideSyncBar() { document.getElementById("sync-bar").classList.remove("show"); }

        lastW = getLastWeight(resEx.id);
        pb = getPB(resEx.id, baseEx.lowerIsBetter);

      }

      const cardBg = isOn ? "var(--accentDim)" : isLogged ? "var(--greenDim)" : "var(--surface)";

      const namCol = isOn ? "var(--accent)" : isLogged ? "var(--green)" : "var(--text)";

      if (isLogged) {
        if(baseEx.isCardio) {
          weightRight = `<div class="ex-weight-val" style="color:var(--green)">DONE</div>`;
        } else {
          const isTodayPB = pb !== null && todayW === pb;
          weightRight = `<div class="ex-weight"><div class="ex-weight-val" style="color:${isTodayPB ? "var(--accent)" : "var(--green)"}">${todayW}<span class="ex-weight-unit">kg</span></div>${isTodayPB ? `<div class="ex-pb-badge" style="color:var(--accent)">🏆 PB</div>` : ""}</div>`;
        }
      } else if (lastW !== null && !baseEx.isCardio) {
        weightRight = `<div class="ex-weight-val" style="font-family:'Inconsolata';font-size:14px;color:var(--dim)">${lastW}<span style="font-size:10px">kg</span></div>`;
      } else {
        weightRight = `<div style="font-size:9px;color:var(--dim);letter-spacing:.5px">NO DATA</div>`;
      }

      let dispName = baseEx.name;
      if (baseEx.isOther && isLogged) {
        const loggedEntry = getTodayLog().find(s => s.exerciseId.startsWith(baseEx.id));

      }

      html += `
        <div class="ex-card ${isOn ? "open" : ""}" onclick="handleSelect('${baseEx.id}')" style="background:${cardBg};border:1px solid ${cardBrd};">
          ${isLogged && !isOn ? `<div class="logged-bar"></div>` : ""}
          <div class="ex-card-inner">
            <div class="ex-left">
              <div class="ex-dot" style="border-color:${isOn?"var(--accent)":isLogged?"var(--green)":"var(--dim)"};background:${isOn?"var(--accent)":"transparent"}">${dotInner}</div>
              <div>
                <div class="ex-name" style="color:${namCol}">${dispName}</div>
                ${!baseEx.isCardio ? `<div class="ex-meta">${resEx.sets} × ${resEx.reps} reps</div>` : `<div class="ex-meta">Cardio</div>`}
              </div>
            </div>
            ${weightRight}
          </div>
        </div>`;

      if (isOn) {
        html += `<div class="expand-panel">`;

        if (baseEx.isOther) {
          const sel = otherSelectState[baseEx.id] || (baseEx.alternates[0] || "manual");
          const opts = baseEx.alternates.map(a => `<option value="${a}" ${sel===a?"selected":""}>${a}</option>`).join("");
          html += `<select class="custom-select" onchange="otherSelectState['${baseEx.id}']=this.value; renderLog()" onclick="event.stopPropagation()">
                     ${opts}<option value="manual" ${sel==="manual"?"selected":""}>Other - manual entry</option>
                   </select>`;
          if (sel === "manual") {
             html += `<input type="text" class="custom-input" placeholder="Custom Exercise Name" value="${otherManualNames[baseEx.id] || ''}" oninput="otherManualNames['${baseEx.id}']=this.value; renderLog()" onclick="event.stopPropagation()">`;
             html += `<div class="input-row">
                        <div class="weight-wrap"><input type="number" class="weight-input" style="font-size:16px" placeholder="Sets" value="${setsInput}" oninput="setsInput=this.value" onclick="event.stopPropagation()"><span class="kg-label">sets</span></div>
                      </div>`;
          }
        }

        if (baseEx.isCardio) {
          html += `
            <div class="input-row">
              <div class="weight-wrap"><input type="number" class="weight-input" placeholder="0.0" value="${cardioDist}" oninput="cardioDist=this.value" onclick="event.stopPropagation()"><span class="kg-label">dist</span></div>
              <div class="weight-wrap"><input type="number" class="weight-input" placeholder="0.0" value="${cardioSpeed}" oninput="cardioSpeed=this.value" onclick="event.stopPropagation()"><span class="kg-label">speed</span></div>
              <select class="custom-select" style="width:80px; margin-bottom:0" onchange="cardioUnit=this.value" onclick="event.stopPropagation()">
                <option value="kph" ${cardioUnit==="kph"?"selected":""}>KPH</option>
                <option value="mph" ${cardioUnit==="mph"?"selected":""}>MPH</option>
              </select>
            </div>
            <button class="log-btn" style="width:100%; padding:14px" onclick="logWeight(); event.stopPropagation()">LOG CARDIO</button>
          `;
        } else {
          const chips = lastW !== null ? [lastW - 2.5, lastW, lastW + 2.5, lastW + 5].filter(v => v > 0) : [];
          html += `<div class="stat-row">
              <div class="stat-box"><div class="stat-box-label">LAST</div><div class="stat-box-val">${lastW !== null ? lastW + " kg" : "—"}</div></div>
              <div class="stat-box" style="background:var(--accentDim);border-color:var(--accentBrd)"><div class="stat-box-label" style="color:var(--accent)">BEST</div><div class="stat-box-val" style="color:var(--accent)">${pb !== null ? pb + " kg" : "—"}</div></div>
            </div>
            <div class="input-row">
              <div class="weight-wrap">
                <input class="weight-input" type="number" step="0.5" min="0" value="${weightInput}" placeholder="0.0" oninput="weightInput=this.value" onclick="event.stopPropagation()"/>
                <span class="kg-label">kg</span>

              <div class="weight-wrap" style="flex: 0.6">
                <input class="weight-input" type="number" min="1" value="${repInput}" placeholder="${resEx.reps}" oninput="repInput=this.value" onclick="event.stopPropagation()"/>
                <span class="kg-label">reps</span>
              </div>
              <button class="log-btn" onclick="logWeight(); event.stopPropagation()">LOG</button>
            </div>
            ${chips.length ? `<div class="chips-row">${chips.map(v => `<button class="chip" onclick="setChip(${v}); event.stopPropagation()">${v}</button>`).join("")}</div>` : ""}
            
            <div class="set-tracker" onclick="event.stopPropagation()">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                    <span style="font-size:10px; color:var(--muted); letter-spacing:1px; font-weight:700">SETS COMPLETED</span>
                    <span style="font-size:10px; color:var(--accent)">${completedSets[baseEx.id] || 0} / ${resEx.sets}</span>
                </div>
                <div class="set-bar-bg"><div class="set-bar-fill" style="width: ${Math.min(((completedSets[baseEx.id]||0) / resEx.sets) * 100, 100)}%"></div></div>
                <button class="chip" style="width:100%; border-color:var(--accent); color:var(--accent)" onclick="logSet('${baseEx.id}', ${resEx.sets}); event.stopPropagation()">✓ COMPLETE SET</button>
            </div>
          `;
          
          // GLOBAL STOPWATCH
          const target = (baseEx.id === 'bench' || baseEx.id === 'squats') ? 120 : 90;
          if (swTarget === 0 || !swActive) swTarget = target; 

          const mins = Math.floor(swTime / 60);
          const secs = swTime % 60;
          const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
          const pct = Math.min(100, (swTime / swTarget) * 100);
          const barColor = (swTime >= swTarget) ? 'var(--green)' : 'var(--accent)';

          // FIXED: Font size bumped from 32px to 54px
          html += `
            <div class="stopwatch-container" onclick="event.stopPropagation()" style="margin-top:12px; background:var(--bg); padding:10px; border-radius:6px; border:1px solid var(--border);">
               <div style="font-size:10px; color:var(--muted); letter-spacing:1px; font-weight:700; margin-bottom:4px;">REST TIMER</div>
               <div id="sw-disp" style="color:var(--accent); font-family:'Bebas Neue', sans-serif; font-size:54px; text-align:center; letter-spacing:3px; margin-bottom:8px; line-height:1;">${timeStr}</div>
               <div class="set-bar-bg" style="height:6px; margin-bottom:12px;">
                 <div id="sw-bar" class="set-bar-fill" style="width:${pct}%; background:${barColor}; transition:none;"></div>
               </div>
               <div class="chips-row" style="margin-top:0">
                 <button id="sw-btn-start" class="chip" style="${swActive ? 'background:var(--surface2); color:var(--text); border-color:var(--border);' : 'border-color:var(--accent); color:var(--accent);'}" onclick="toggleTimer(${target}); event.stopPropagation()">${swActive ? 'STOP' : 'START'}</button>
                 <button class="chip" onclick="resetTimer(); event.stopPropagation()">RESET</button>

  });
  document.getElementById("exercise-list").innerHTML = html;

function renderHistory() {
  const byDate = sessions.reduce((acc, s) => { (acc[s.date] ||= []).push(s); return acc; }, {});
  const dates = Object.keys(byDate).sort((a, b) => new Date(b) - new Date(a));
  if (!dates.length) return document.getElementById("history-content").innerHTML = `<div class="empty-state"><div class="empty-title">NO SESSIONS YET</div><div class="empty-sub">Go lift something heavy.</div></div>`;

  let html = "";
  dates.forEach(date => {
    const isToday = date === today;
    html += `<div style="margin-bottom:24px"><div class="hist-date-label" style="color:${isToday?"var(--accent)":"var(--muted)"};border-bottom:1px solid ${isToday?"var(--accentBrd)":"var(--border)"}"><span>${fmtDate(date)}</span>${isToday ? `<span class="today-chip">TODAY</span>` : ""}</div><div>`;
    
    byDate[date].sort((a, b) => a.exerciseName.localeCompare(b.exerciseName)).forEach(s => {
      if (s.isCardio) {
        html += `<div class="hist-entry"><div><div class="hist-name">${s.exerciseName}</div><div class="hist-meta">${s.subgroup || s.category}</div></div>
                 <div><div class="hist-weight">${s.distance}<span style="font-size:10px;color:var(--muted)"> dist</span></div><div class="hist-pb" style="color:var(--muted)">${s.speed} kph</div></div></div>`;
      } else {
        const pb = getPB(s.exerciseId, findExercise(s.exerciseId.split('_manual')[0].split('_')[0])?.lowerIsBetter); 
        const isBest = pb !== null && s.weight === pb;
        html += `<div class="hist-entry ${isBest ? "is-pb" : ""}">
                  <div><div class="hist-name">${s.exerciseName}</div><div class="hist-meta">${s.sets} × ${s.reps} · ${s.subgroup || s.category}</div></div>
                  <div><div class="hist-weight" style="color:${isBest ? "var(--accent)" : "var(--text)"}">${s.weight}<span style="font-size:10px;color:var(--muted)">kg</span></div>${isBest ? `<div class="hist-pb">🏆 PB</div>` : ""}</div>
                </div>`;
      }
    });
    html += `</div></div>`;
  });
  document.getElementById("history-content").innerHTML = html;
}

function renderPBs() {
  let bests = {};
  sessions.filter(s => !s.isCardio && s.weight).forEach(s => {
    if(!bests[s.exerciseId] || s.weight > bests[s.exerciseId].weight) bests[s.exerciseId] = s;
  });

  let html = `<button class="modal-btn" style="margin-bottom:20px; font-size:15px; padding:10px" onclick="openLegacyModal()">+ ADD LEGACY PB</button>`;
  
  let renderedPBs = new Set();
  
  Object.entries(PROGRAM).forEach(([cat, groups]) => {
    html += `<div style="margin-bottom:26px"><div class="hist-date-label" style="color:var(--accent);border-bottom:1px solid var(--accentBrd)"><span>${cat.toUpperCase()}</span></div><div>`;
    Object.entries(groups).forEach(([sg, exs]) => {
      html += `<div class="subgroup-label">${sg}</div>`;
      exs.forEach(baseEx => {
        if(baseEx.isCardio) return;
        if(renderedPBs.has(baseEx.id)) return;
        renderedPBs.add(baseEx.id);
        
        const loggedVars = Object.values(bests).filter(b => b.exerciseId.startsWith(baseEx.id));
        if(!loggedVars.length) {
            html += `<div class="hist-entry"><div><div class="hist-name">${baseEx.name}</div></div><div class="hist-weight" style="color:var(--dim)">—</div></div>`;
        } else {
            loggedVars.forEach(v => {
                html += `<div class="hist-entry is-pb"><div><div class="hist-name">${v.exerciseName}</div></div>
                         <div class="hist-weight" style="color:var(--accent)">${v.weight}<span style='font-size:10px;color:var(--muted)'>kg</span></div></div>`;
            });
        }
      });
    });
    html += `</div></div>`;
  });
  document.getElementById("pbs-content").innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────────────────
// UI INTERACTIONS & MODALS
// ─────────────────────────────────────────────────────────────────────────────
function selectCat(cat) { category = cat; selectedId = null; weightInput = ""; repInput = ""; renderCatBar(); renderLog(); updateDoneBadge(); }
function handleSelect(id) { 
  if (selectedId === id) { selectedId = null; weightInput = ""; repInput = ""; } 
  else { 
    selectedId = id; 
    const resEx = getResolvedEx(findExercise(id));
    const last = getLastWeight(resEx.id); weightInput = last !== null ? String(last) : ""; 
    repInput = "";
  } 
  renderLog(); 
}
function setChip(v) { weightInput = String(v); renderLog(); }
function switchView(v) {
  currentView = v;
  ["log", "history", "pbs"].forEach(n => { document.getElementById(`view-${n}`).style.display = n === v ? "" : "none"; document.getElementById(`nav-${n}`).className = `nav-item ${n === v ? "on" : "off"}`; });
  document.getElementById("scroll-area").scrollTop = 0;
  if (v === "history") renderHistory(); if (v === "pbs") renderPBs();
}

function updateDoneBadge() {
  const badge = document.getElementById("done-badge");
  let mandatoryCount = 0;
  let loggedMandatory = 0;
  let loggedBonus = 0;
  
  Object.entries(PROGRAM[category]).forEach(([sg, exs]) => {
    if (sg === "ABS" || sg === "CARDIO") {
      exs.forEach(ex => {
        if (getTodayLog().some(s => s.exerciseId.startsWith(ex.id))) loggedBonus++;
      });
    } else {
      let blockMandatory = exs.filter(e => !e.isOther).length;
      mandatoryCount += blockMandatory;
      let blockLogged = 0;
      exs.forEach(ex => {
        if (getTodayLog().some(s => s.exerciseId.startsWith(ex.id))) blockLogged++;
      });
      // "OR" logic: Caps at mandatory count, meaning 'Other' acts as a valid replacement
      loggedMandatory += Math.min(blockMandatory, blockLogged); 
    }
  });

  if (loggedMandatory > 0 || loggedBonus > 0) {
    badge.style.display = "block";
    let txt = `${loggedMandatory}/${mandatoryCount} done`;
    if (loggedBonus > 0) txt += ` + ${loggedBonus}/4 bonus`;
    badge.textContent = txt;
  } else {
    badge.style.display = "none";
  }
}

let toastTimer = null;
function showToast(msg, type = "") {
  const el = document.getElementById("toast"); el.textContent = msg; el.className = type || ""; el.style.display = "block";
  el.style.animation = "none"; el.offsetHeight; el.style.animation = "";
  if (toastTimer) clearTimeout(toastTimer); toastTimer = setTimeout(() => { el.style.display = "none"; }, 2600);
}

// Setup Modals
function showSetup() { document.getElementById("auth-modal").classList.add("hidden"); document.getElementById("setup-modal").classList.remove("hidden"); if (clientId) document.getElementById("client-id-input").value = clientId; if (spreadsheetId) document.getElementById("sheet-id-input").value = spreadsheetId; }
function saveSetup() { const cid = document.getElementById("client-id-input").value.trim(); const sid = document.getElementById("sheet-id-input").value.trim(); if (!cid) { showToast("Enter your Client ID", "error"); return; } clientId = cid; localStorage.setItem("gains_client_id", clientId); if (sid) { spreadsheetId = sid; localStorage.setItem("gains_sheet_id", spreadsheetId); } document.getElementById("setup-modal").classList.add("hidden"); loadGSI(); setTimeout(() => requestToken(), 800); }
function dismissAuth() { document.getElementById("auth-modal").classList.add("hidden"); localStorage.setItem("gains_auth_dismissed", "1"); }

// Legacy PB logic
function openLegacyModal() {
  const select = document.getElementById("legacy-ex");
  let opts = "";
  let seenLegacy = new Set();
  Object.entries(PROGRAM).forEach(([cat, groups]) => {
    Object.entries(groups).forEach(([sg, exs]) => {
       exs.forEach(ex => { 
         if(!ex.isOther && !ex.isCardio && !seenLegacy.has(ex.id)) {
           seenLegacy.add(ex.id);
           opts += `<option value="${ex.id}">${ex.name} (${cat})</option>`; 
         }
       });
    });
  });
  select.innerHTML = opts;
  document.getElementById("legacy-modal").classList.remove("hidden");
}
function saveLegacyPB() {
  const exId = document.getElementById("legacy-ex").value;
  const w = parseFloat(document.getElementById("legacy-w").value);
  const r = parseInt(document.getElementById("legacy-r").value) || 1;
  if(isNaN(w) || w <= 0) return showToast("Enter valid weight", "error");
  
  const ex = findExercise(exId);
  const subgroup = Object.entries(PROGRAM[ex.category||"Pull"]).find(([, exs]) => exs.some(e => e.id === ex.id))?.[0] ?? "";
  
  const entry = {
    id: Date.now().toString(), date: "2020-01-01",
    exerciseId: ex.id, exerciseName: ex.name,
    category: "Legacy", subgroup: subgroup, weight: w, sets: 1, reps: r,
  };
  persist([...sessions, entry]);
  document.getElementById("legacy-modal").classList.add("hidden");
  showToast("Legacy PB Saved!");
  renderPBs();
}

// Init
loadData(); renderAll();
if (!clientId && !localStorage.getItem("gains_auth_dismissed")) setTimeout(() => document.getElementById("auth-modal").classList.remove("hidden"), 1200);
if (clientId) loadGSI();

if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(() => {}); }); }

// Automatically refresh the day when the app is reopened
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    const newToday = todayISO();
    if (today !== newToday) {
      today = newToday;
      completedSets = {}; // Reset the set counters
      renderAll();        // Refresh the UI to a clean slate
    }
  }
});
